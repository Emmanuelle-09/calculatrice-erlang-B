<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calculatrice Erlang B</title>
  <style>
    body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #6a0dad, #8e44ad); /* Dégradé violet élégant */
  color: #f0f0f0;
  text-align: center;
}

.container {
  margin: 50px auto;
  padding: 25px;
  background: rgba(255,255,255,0.05); /* léger contraste transparent */
  border-radius: 12px;
  width: 480px;
  box-shadow: 0 0 20px rgba(0,0,0,0.4);
}

.header {
  background: #2c2c3c; /* bandeau sombre pour contraste */
  color: #FFD700; /* jaune or */
  font-weight: bold;
  padding: 15px;
  border-radius: 8px;
  margin-bottom: 20px;
  box-shadow: 0 0 10px rgba(255,215,0,0.7); /* effet lumineux doré */
}

input {
  width: 80%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  font-size: 14px;
}

button {
  background: #87CEEB; /* bleu ciel */
  color: #000;
  padding: 12px 25px;
  border: none;
  border-radius: 25px; /* bouton arrondi */
  cursor: pointer;
  font-weight: bold;
  font-size: 15px;
  transition: 0.3s;
}

button:hover {
  background: #00BFFF; /* bleu ciel plus vif au survol */
  box-shadow: 0 0 10px rgba(0,191,255,0.7); /* effet lumineux */
}

.result {
  margin-top: 20px;
  font-weight: bold;
  color: #FFD700; /* jaune or */
  font-size: 18px;
  background: rgba(255,255,255,0.1);
  padding: 10px;
  border-radius: 8px;
}

h2 {
  color: #fff;
  margin-bottom: 15px;
}
  </style>
</head>
<body>
  <div class="container">
    <!-- En-tête avec filière et membres -->
    <div class="header">
      Filière : LIPRO_ASR <br>
      Membres du groupe : <br>
      TOUMENI NJONGUE EMMANUELLE SAMANTHA <br>
      VITIANA BIBIANA EKONG
    </div>

    <h2>📡 Calculatrice Erlang B</h2>
    <label>Trafic (A) en Erlangs :</label><br>
    <input type="number" id="trafic" step="0.1"><br>
    <label>Probabilité de blocage (%) :</label><br>
    <input type="number" id="pb" step="0.1"><br>
    <button onclick="calculer()">⚡ Calculer</button>
    <div class="result" id="resultat"></div>
  </div>

  <script>
    function erlangB(A, N) {
      let num = Math.pow(A, N) / factorial(N);
      let den = 0;
      for (let k = 0; k <= N; k++) {
        den += Math.pow(A, k) / factorial(k);
      }
      return num / den;
    }

    function factorial(n) {
      return n <= 1 ? 1 : n * factorial(n - 1);
    }

    function findCircuits(A, Pb_target) {
      let N = 1;
      while (true) {
        let Pb = erlangB(A, N);
        if (Pb <= Pb_target) return N;
        N++;
        if (N > 500) return "Trop grand"; // sécurité
      }
    }

    function calculer() {
      let A = parseFloat(document.getElementById("trafic").value);
      let Pb_percent = parseFloat(document.getElementById("pb").value);
      let Pb_target = Pb_percent / 100;
      let N = findCircuits(A, Pb_target);
      document.getElementById("resultat").innerText = "Nombre de canaux nécessaires : " + N;
    }
  </script>
</body>
</html>
